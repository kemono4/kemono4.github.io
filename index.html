<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SATB Checker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <img src="staff.png" class="staff" width="1094px">

  <img src="sharp.png" class="symbol" id="sharp0" height="47px">
  <img src="sharp.png" class="symbol" id="sharp1" height="47px">
  <img src="sharp.png" class="symbol" id="sharp2" height="47px">
  <img src="sharp.png" class="symbol" id="sharp3" height="47px">
  <img src="sharp.png" class="symbol" id="sharp4" height="47px">
  <img src="sharp.png" class="symbol" id="sharp5" height="47px">
  <img src="sharp.png" class="symbol" id="sharp6" height="47px">
  <img src="sharp.png" class="symbol" id="bsharp0" height="47px">
  <img src="sharp.png" class="symbol" id="bsharp1" height="47px">
  <img src="sharp.png" class="symbol" id="bsharp2" height="47px">
  <img src="sharp.png" class="symbol" id="bsharp3" height="47px">
  <img src="sharp.png" class="symbol" id="bsharp4" height="47px">
  <img src="sharp.png" class="symbol" id="bsharp5" height="47px">
  <img src="sharp.png" class="symbol" id="bsharp6" height="47px">

  <img src="flat.png" class="symbol" id="flat0" height="30px">
  <img src="flat.png" class="symbol" id="flat1" height="30px">
  <img src="flat.png" class="symbol" id="flat2" height="30px">
  <img src="flat.png" class="symbol" id="flat3" height="30px">
  <img src="flat.png" class="symbol" id="flat4" height="30px">
  <img src="flat.png" class="symbol" id="flat5" height="30px">
  <img src="flat.png" class="symbol" id="flat6" height="30px">
  <img src="flat.png" class="symbol" id="bflat0" height="30px">
  <img src="flat.png" class="symbol" id="bflat1" height="30px">
  <img src="flat.png" class="symbol" id="bflat2" height="30px">
  <img src="flat.png" class="symbol" id="bflat3" height="30px">
  <img src="flat.png" class="symbol" id="bflat4" height="30px">
  <img src="flat.png" class="symbol" id="bflat5" height="30px">
  <img src="flat.png" class="symbol" id="bflat6" height="30px">

  <div class="fb" id="fb">
  <br>
  <br>
  <div class="container" id="container">
    <h1>SATB Checker</h1>
    <div class="input-container">
      <label>Key</label>
        <select class="input-container" id="pname">
          <option value="C">C</option>
          <option value="C#">C#</option>
          <option value="Db">Db</option>
          <option value="D">D</option>
          <option value="D#">D#</option>
          <option value="Eb">Eb</option>
          <option value="E">E</option>
          <option value="F">F</option>
          <option value="F#">F#</option>
          <option value="Gb">Gb</option>
          <option value="G">G</option>
          <option value="G#">G#</option>
          <option value="Ab">Ab</option>
          <option value="A">A</option>
          <option value="A#">A#</option>
          <option value="Bb">Bb</option>
          <option value="B">B</option>
          
        </select>
        <select class="input-container" id="key">
          <option value="">Major</option>
          <option value="m">minor</option>
        </select>
    </div>
    <div class="input-container">
      <label for="sopranoInput">Soprano:</label>
      <input type="text" id="sopranoInput" placeholder="Enter soprano notes (C4/D4/E4...)" />
    </div>
    <div class="input-container">
      <label for="altoInput">Alto:</label>
      <input type="text" id="altoInput" placeholder="Enter alto notes (C4/D4/E4...)" />
    </div>
    <div class="input-container">
      <label for="tenorInput">Tenor:</label>
      <input type="text" id="tenorInput" placeholder="Enter tenor notes (C4/D4/E4...)" />
    </div>
    <div class="input-container">
      <label for="bassInput">Bass:</label>
      <input type="text" id="bassInput" placeholder="Enter bass notes (C4/D4/E4...)" />
    </div>
    <div class="input-container">
      <label for="figuredbassInput">Figured Bass:</label>
      <input type="text" id="figuredbassInput" placeholder="Enter figured bass (64/7/5#...)" />
    </div>
    <br>
    <button id="check" onclick="checkHarmony()">Check Harmony</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
