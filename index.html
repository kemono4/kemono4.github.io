<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SATB Checker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <img src="staff.png" class="staff" width="100%">
  <!--
  <img src="note.png" class="snote" width="19">
  <img src="note.png" class="anote" width="19">
  <img src="note.png" class="tnote" width="19">
  <img src="note.png" class="bnote" width="19">
-->
  <div class="container">
    <h1>SATB Checker</h1>
    
    <div class="input-container">
      <label>Key</label>
        <select id="key">
          <option value="C">C Major</option>
          <option value="c">c minor</option>
          <option value="D">D Major</option>
          <option value="d">d minor</option>
        </select>
    </div>
    <div class="input-container">
      <label for="sopranoInput">Soprano:</label>
      <input type="text" id="sopranoInput" placeholder="Enter soprano notes (C4/D4/E4...)" />
    </div>
    <div class="input-container">
      <label for="altoInput">Alto:</label>
      <input type="text" id="altoInput" placeholder="Enter alto notes (C4/D4/E4...)" />
    </div>
    <div class="input-container">
      <label for="tenorInput">Tenor:</label>
      <input type="text" id="tenorInput" placeholder="Enter tenor notes (C4/D4/E4...)" />
    </div>
    <div class="input-container">
      <label for="bassInput">Bass:</label>
      <input type="text" id="bassInput" placeholder="Enter bass notes (C4/D4/E4...)" />
    </div>
    <div class="input-container">
      <label for="figuredbassInput">Figured Bass:</label>
      <input type="text" id="figuredbassInput" placeholder="Enter figured bass (64/7/5#...)" />
    </div>
    <button onclick="checkHarmony()">Check Harmony</button>
    <div id="result" style="text-decoration: underline;"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
